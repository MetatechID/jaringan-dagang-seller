[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "beckn-protocol"
version = "0.1.0"
description = "Beckn protocol Pydantic v2 models and Ed25519 signing utilities for BAP/BPP services"
readme = "README.md"
license = "MIT"
requires-python = ">=3.11"
dependencies = [
    "pydantic>=2.0,<3.0",
    "pynacl>=1.5,<2.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.0",
    "pytest-asyncio>=0.21",
]

[tool.hatch.build.targets.wheel]
packages = ["python"]
