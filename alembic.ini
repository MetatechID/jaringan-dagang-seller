[alembic]
# Path to migration scripts.
script_location = alembic

# The URL is set dynamically in env.py from app.config.settings.
# sqlalchemy.url is left empty here intentionally.
sqlalchemy.url =

# Template used to generate migration files.
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d%%(second).2d_%%(rev)s_%%(slug)s

# Truncate the "slug" field to this many characters.
truncate_slug_length = 60

# Set to 'true' to run the environment during the 'revision' command.
revision_environment = false

# Set to 'true' to allow .pyc and .pyo files without the source .py file
# to be detected as revisions in the migration scripts directory.
sourceless = false

# Version number suffix for file names. Currently using revision id only.
version_path_separator = os

# Output encoding used when revision files are written from script.py.mako
output_encoding = utf-8


[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
